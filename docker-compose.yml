services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-urlshortener}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  zookeeper:
    image: zookeeper:3.9
    ports:
      - '${ZOOKEEPER_PORT:-2181}:2181'
    healthcheck:
      test: ['CMD-SHELL', 'zkServer.sh status | grep -E "Mode: (standalone|leader|follower|observer)"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - '${KAFKA_PORT:-9092}:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  adminer:
    image: adminer:4
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${ADMINER_PORT:-8080}:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  url-shortener-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      HOST: ${API_HOST:-0.0.0.0}
      PORT: ${API_PORT:-80}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/urlshortener}
      REDIS_WRITE_URL: ${REDIS_WRITE_URL:-redis://redis:6379}
      REDIS_READ_URL: ${REDIS_READ_URL:-redis://redis:6379}
      COUNTER_BACKEND: ${COUNTER_BACKEND:-redis}
      ZOOKEEPER_URL: ${ZOOKEEPER_URL:-zookeeper:2181}
      ZOOKEEPER_COUNTER_RANGE_SIZE: ${ZOOKEEPER_COUNTER_RANGE_SIZE:-10000}
      ZOOKEEPER_COUNTER_PREFETCH_PERCENT: ${ZOOKEEPER_COUNTER_PREFETCH_PERCENT:-20}
      ZOOKEEPER_COUNTER_LEASE_MAX_RETRIES: ${ZOOKEEPER_COUNTER_LEASE_MAX_RETRIES:-12}
      ZOOKEEPER_COUNTER_LEASE_BACKOFF_MS: ${ZOOKEEPER_COUNTER_LEASE_BACKOFF_MS:-5}
      SHORT_URL_HOST: ${SHORT_URL_HOST:-http://localhost:80}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
    ports:
      - '${API_PORT:-80}:${API_PORT:-80}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
      kafka:
        condition: service_healthy

  url-usage-service:
    build:
      context: .
      dockerfile: apps/url-usage-service/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/urlshortener}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  pgdata:
